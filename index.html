<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4-Way Intersection - Night Traffic Simulation</title>
    <style>
        :root {
            --bg: #0a0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8), 0 0 120px rgba(0, 0, 0, 0.5);
            max-width: 98vw;
            max-height: 96vh;
        }

        #info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }

        #crash-counter {
            position: fixed;
            top: 20px;
            right: 30px;
            color: #ff4444;
            font-size: 14px;
            letter-spacing: 2px;
            pointer-events: none;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="info">4-Way Intersection &bull; No Traffic Lights &bull; AI Collision Avoidance</div>
    <div id="crash-counter">CRASHES: 0</div>

    <script>
        (function() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const crashCounterEl = document.getElementById('crash-counter');

            // --- Canvas Setup ---
            const W = 960;
            const H = 640;
            canvas.width = W;
            canvas.height = H;

            // Responsive scaling
            function resizeCanvas() {
                const scale = Math.min(
                    window.innerWidth / W * 0.96,
                    window.innerHeight / H * 0.94
                );
                canvas.style.width = (W * scale) + 'px';
                canvas.style.height = (H * scale) + 'px';
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // --- Constants ---
            const CENTER_X = W / 2;
            const CENTER_Y = H / 2;
            const ROAD_HALF = 62; // Half of total road width (124px = 4 lanes × 31px)
            const LANE_WIDTH = 31;
            const INTERSECTION_HALF = ROAD_HALF; // Intersection zone matches road width
            const CAR_LENGTH = 38;
            const CAR_WIDTH = 19;
            const HEADLIGHT_RANGE = 75;
            const DETECTION_RANGE = 140;
            const SAFE_FOLLOW_DIST = 65;
            const MAX_SPEED = 2.2;
            const MIN_SPEED = 0.6;
            const SPAWN_INTERVAL_MIN = 380;
            const SPAWN_INTERVAL_MAX = 900;
            const MAX_ACTIVE_CARS = 28;

            // --- Direction vectors ---
            const EAST = { dx: 1, dy: 0, name: 'EAST', horizontal: true };
            const WEST = { dx: -1, dy: 0, name: 'WEST', horizontal: true };
            const SOUTH = { dx: 0, dy: 1, name: 'SOUTH', horizontal: false };
            const NORTH = { dx: 0, dy: -1, name: 'NORTH', horizontal: false };

            const ALL_DIRS = [EAST, WEST, SOUTH, NORTH];

            // Lane offsets from road center
            // For horizontal road (EAST/WEST): lanes are at Y offsets
            // Inner lanes: ±15.5, Outer lanes: ±46.5
            const LANE_INNER = 15.5;
            const LANE_OUTER = 46.5;

            function getLaneOffsets(horizontal) {
                if (horizontal) {
                    return [-LANE_OUTER, -LANE_INNER, LANE_INNER, LANE_OUTER];
                } else {
                    return [-LANE_OUTER, -LANE_INNER, LANE_INNER, LANE_OUTER];
                }
            }

            // For horizontal road: EAST uses negative Y offsets (upper half), WEST uses positive (lower half)
            function getLaneYForEastbound(laneIndex) {
                // laneIndex 0=outer, 1=inner for eastbound
                return CENTER_Y - (laneIndex === 0 ? LANE_OUTER : LANE_INNER);
            }

            function getLaneYForWestbound(laneIndex) {
                return CENTER_Y + (laneIndex === 0 ? LANE_OUTER : LANE_INNER);
            }

            function getLaneXForSouthbound(laneIndex) {
                return CENTER_X - (laneIndex === 0 ? LANE_OUTER : LANE_INNER);
            }

            function getLaneXForNorthbound(laneIndex) {
                return CENTER_X + (laneIndex === 0 ? LANE_OUTER : LANE_INNER);
            }

            // --- Car color palette (muted for night) ---
            const CAR_COLORS = [
                '#c44b3c', '#3a7cc3', '#5a9e4b', '#d4a840', '#8b5e9e',
                '#e8e8e8', '#2c2c2c', '#d87c3a', '#4ba3a8', '#b8556e',
                '#6e8fb5', '#c9b870', '#7a9a6d', '#a65d50', '#5c7a9a',
                '#d0d0c8', '#3d3d3d', '#e09050', '#5588aa', '#9e6b7c'
            ];

            // --- State ---
            let cars = [];
            let explosions = [];
            let totalCrashes = 0;
            let spawnTimer = 0;
            let nextSpawnTime = randomRange(SPAWN_INTERVAL_MIN, SPAWN_INTERVAL_MAX);
            let frameCount = 0;

            // --- Utility Functions ---
            function randomRange(min, max) {
                return min + Math.random() * (max - min);
            }

            function randomInt(min, max) {
                return Math.floor(randomRange(min, max + 1));
            }

            function randomChoice(arr) {
                return arr[Math.floor(Math.random() * arr.length)];
            }

            function distance(x1, y1, x2, y2) {
                return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
            }

            function clamp(val, min, max) {
                return Math.max(min, Math.min(max, val));
            }

            function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
                return !(ax + aw < bx || bx + bw < ax || ay + ah < by || by + bh < ay);
            }

            // --- Explosion Class ---
            class Explosion {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.age = 0;
                    this.maxAge = 1.6; // seconds
                    this.particles = [];
                    this.ringRadius = 0;
                    this.maxRingRadius = 55;

                    // Create particles
                    const numParticles = 35;
                    for (let i = 0; i < numParticles; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const speed = randomRange(40, 180);
                        this.particles.push({
                            x: 0,
                            y: 0,
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed,
                            size: randomRange(2, 7),
                            color: randomChoice(['#ff2200', '#ff6600', '#ffaa00',
                                '#ffdd00', '#ff4400', '#ffffff'
                            ]),
                            life: randomRange(0.3, 1.3),
                            maxLife: randomRange(0.3, 1.3),
                        });
                    }
                    // Secondary spark particles
                    for (let i = 0; i < 20; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const speed = randomRange(20, 100);
                        this.particles.push({
                            x: 0,
                            y: 0,
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed,
                            size: randomRange(1, 3),
                            color: '#ffffcc',
                            life: randomRange(0.15, 0.6),
                            maxLife: randomRange(0.15, 0.6),
                        });
                    }
                }

                update(dt) {
                    this.age += dt;
                    this.ringRadius = (this.age / this.maxAge) * this.maxRingRadius;
                    for (const p of this.particles) {
                        p.x += p.vx * dt;
                        p.y += p.vy * dt;
                        p.life -= dt;
                        p.vx *= 0.96;
                        p.vy *= 0.96;
                    }
                }

                isDead() {
                    return this.age >= this.maxAge;
                }

                draw(ctx) {
                    const alpha = Math.max(0, 1 - this.age / this.maxAge);
                    const cx = this.x;
                    const cy = this.y;

                    // Expanding ring
                    if (this.ringRadius > 0 && alpha > 0.1) {
                        ctx.save();
                        ctx.globalAlpha = alpha * 0.7;
                        ctx.strokeStyle = '#ff4400';
                        ctx.lineWidth = 4;
                        ctx.shadowColor = '#ff2200';
                        ctx.shadowBlur = 20;
                        ctx.beginPath();
                        ctx.arc(cx, cy, this.ringRadius, 0, Math.PI * 2);
                        ctx.stroke();

                        // Inner ring
                        ctx.globalAlpha = alpha * 0.5;
                        ctx.strokeStyle = '#ffaa00';
                        ctx.lineWidth = 2;
                        ctx.shadowBlur = 10;
                        ctx.beginPath();
                        ctx.arc(cx, cy, this.ringRadius * 0.55, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.restore();
                    }

                    // Glowing core
                    if (alpha > 0.3) {
                        ctx.save();
                        ctx.globalAlpha = alpha * 0.8;
                        const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 22);
                        coreGrad.addColorStop(0, '#ffffff');
                        coreGrad.addColorStop(0.2, '#ffdd00');
                        coreGrad.addColorStop(0.5, '#ff6600');
                        coreGrad.addColorStop(1, 'transparent');
                        ctx.fillStyle = coreGrad;
                        ctx.beginPath();
                        ctx.arc(cx, cy, 22, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    }

                    // Particles
                    for (const p of this.particles) {
                        if (p.life <= 0) continue;
                        const pAlpha = (p.life / p.maxLife) * alpha;
                        ctx.save();
                        ctx.globalAlpha = pAlpha;
                        ctx.fillStyle = p.color;
                        ctx.shadowColor = p.color;
                        ctx.shadowBlur = 6;
                        ctx.beginPath();
                        ctx.arc(cx + p.x, cy + p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    }
                }
            }

            // --- Car Class ---
            class Car {
                constructor(x, y, direction, laneIndex, turnIntention, color) {
                    this.x = x;
                    this.y = y;
                    this.direction = direction; // EAST, WEST, SOUTH, NORTH
                    this.laneIndex = laneIndex; // 0=outer, 1=inner
                    this.turnIntention = turnIntention; // 'straight', 'right', 'left'
                    this.color = color;
                    this.speed = randomRange(1.0, MAX_SPEED);
                    this.targetSpeed = this.speed;
                    this.braking = false;
                    this.brakeIntensity = 0;
                    this.crashed = false;
                    this.inIntersection = false;
                    this.hasTurned = false;
                    this.id = Math.random().toString(36).substr(2, 6);
                    this.spawnSide = this.getSpawnSide();
                    this.approachDistance = 0; // Distance from intersection center
                }

                getSpawnSide() {
                    if (this.direction === EAST) return 'left';
                    if (this.direction === WEST) return 'right';
                    if (this.direction === SOUTH) return 'top';
                    return 'bottom';
                }

                getLength() {
                    return CAR_LENGTH;
                }

                getWidth() {
                    return CAR_WIDTH;
                }

                getBounds() {
                    const halfL = CAR_LENGTH / 2;
                    const halfW = CAR_WIDTH / 2;
                    if (this.direction.horizontal) {
                        return {
                            x: this.x - halfL,
                            y: this.y - halfW,
                            w: CAR_LENGTH,
                            h: CAR_WIDTH
                        };
                    } else {
                        return {
                            x: this.x - halfW,
                            y: this.y - halfL,
                            w: CAR_WIDTH,
                            h: CAR_LENGTH
                        };
                    }
                }

                getFrontCenter() {
                    const halfL = CAR_LENGTH / 2;
                    return {
                        x: this.x + this.direction.dx * halfL,
                        y: this.y + this.direction.dy * halfL
                    };
                }

                getRearCenter() {
                    const halfL = CAR_LENGTH / 2;
                    return {
                        x: this.x - this.direction.dx * halfL,
                        y: this.y - this.direction.dy * halfL
                    };
                }

                getFrontCorners() {
                    const halfL = CAR_LENGTH / 2;
                    const halfW = CAR_WIDTH / 2;
                    const fx = this.x + this.direction.dx * halfL;
                    const fy = this.y + this.direction.dy * halfL;
                    if (this.direction.horizontal) {
                        return [
                            { x: fx, y: fy - halfW },
                            { x: fx, y: fy + halfW }
                        ];
                    } else {
                        return [
                            { x: fx - halfW, y: fy },
                            { x: fx + halfW, y: fy }
                        ];
                    }
                }

                getRearCorners() {
                    const halfL = CAR_LENGTH / 2;
                    const halfW = CAR_WIDTH / 2;
                    const rx = this.x - this.direction.dx * halfL;
                    const ry = this.y - this.direction.dy * halfL;
                    if (this.direction.horizontal) {
                        return [
                            { x: rx, y: ry - halfW },
                            { x: rx, y: ry + halfW }
                        ];
                    } else {
                        return [
                            { x: rx - halfW, y: ry },
                            { x: rx + halfW, y: ry }
                        ];
                    }
                }

                isInIntersectionZone() {
                    return Math.abs(this.x - CENTER_X) < INTERSECTION_HALF &&
                        Math.abs(this.y - CENTER_Y) < INTERSECTION_HALF;
                }

                isApproachingIntersection() {
                    const distToCenter = distance(this.x, this.y, CENTER_X, CENTER_Y);
                    return distToCenter < DETECTION_RANGE && !this.hasTurned && !this.inIntersection;
                }

                getConflictType(other) {
                    // Determine if two cars' paths could conflict
                    if (this.direction === other.direction) return 'same-direction';
                    if (this.direction.dx === -other.direction.dx && this.direction.dy === -other.direction.dy)
                        return 'opposite';
                    return 'perpendicular';
                }

                update(dt, allCars) {
                    if (this.crashed) return;

                    this.approachDistance = distance(this.x, this.y, CENTER_X, CENTER_Y);

                    // Check if in intersection
                    const wasInIntersection = this.inIntersection;
                    this.inIntersection = this.isInIntersectionZone();

                    // Handle turning when reaching intersection center
                    if (this.inIntersection && !this.hasTurned && this.turnIntention !== 'straight') {
                        const distToCenter = distance(this.x, this.y, CENTER_X, CENTER_Y);
                        if (distToCenter < 18) {
                            this.executeTurn();
                        }
                    }

                    // AI: Determine target speed based on surroundings
                    this.targetSpeed = this.speed; // Default: maintain
                    this.braking = false;
                    this.brakeIntensity = 0;

                    // Check for cars ahead
                    const aheadCheck = this.checkAhead(allCars);
                    if (aheadCheck.shouldBrake) {
                        this.targetSpeed = Math.min(this.targetSpeed, aheadCheck.maxSpeed);
                        this.braking = true;
                        this.brakeIntensity = aheadCheck.intensity;
                    }

                    // Check intersection conflicts
                    if (this.isApproachingIntersection() && !this.hasTurned) {
                        const conflictResult = this.checkIntersectionConflicts(allCars);
                        if (conflictResult.shouldYield) {
                            this.targetSpeed = Math.min(this.targetSpeed, conflictResult.maxSpeed);
                            this.braking = true;
                            this.brakeIntensity = Math.max(this.brakeIntensity, conflictResult.intensity);
                        }
                    }

                    // If in intersection and turning, moderate speed
                    if (this.inIntersection && this.turnIntention !== 'straight' && !this.hasTurned) {
                        this.targetSpeed = Math.min(this.targetSpeed, 1.0);
                    }

                    // Smooth speed adjustment
                    const speedDiff = this.targetSpeed - this.speed;
                    const accel = this.braking ? 4.5 : 2.0;
                    this.speed += speedDiff * Math.min(1, accel * dt);
                    this.speed = clamp(this.speed, 0, MAX_SPEED);

                    // Move
                    this.x += this.direction.dx * this.speed * 60 * dt;
                    this.y += this.direction.dy * this.speed * 60 * dt;

                    // Check if exited intersection
                    if (wasInIntersection && !this.inIntersection && this.hasTurned) {
                        // Car has cleared the intersection after turning
                    }

                    // Check if fully off-screen
                    const margin = 80;
                    if (this.x < -margin || this.x > W + margin || this.y < -margin || this.y > H + margin) {
                        this.crashed = true; // Use as removal flag (not a real crash)
                        this._removeMe = true;
                    }
                }

                checkAhead(allCars) {
                    let closestDist = Infinity;
                    let closestCar = null;

                    const myBounds = this.getBounds();
                    const halfL = CAR_LENGTH / 2;

                    for (const other of allCars) {
                        if (other === this || other.crashed) continue;
                        if (other._removeMe) continue;

                        const otherBounds = other.getBounds();
                        const otherFront = other.getFrontCenter();
                        const myFront = this.getFrontCenter();

                        // Check if other car is generally ahead of us
                        const dx = otherFront.x - this.x;
                        const dy = otherFront.y - this.y;
                        const dotProduct = dx * this.direction.dx + dy * this.direction.dy;

                        if (dotProduct < -10) continue; // Behind us

                        // Check if in same lane corridor
                        const lateralDist = this.getLateralDistance(other);
                        if (lateralDist > CAR_WIDTH * 1.6) continue; // Not in our lane corridor

                        // Calculate distance along direction
                        const alongDist = Math.abs(dotProduct);
                        if (alongDist < closestDist && alongDist < DETECTION_RANGE) {
                            // Check if the other car is actually ahead
                            const projX = this.x + this.direction.dx * alongDist;
                            const projY = this.y + this.direction.dy * alongDist;
                            const actualDist = distance(this.x, this.y, other.x, other.y);

                            if (actualDist < DETECTION_RANGE && dotProduct > -5) {
                                closestDist = actualDist;
                                closestCar = other;
                            }
                        }
                    }

                    if (closestCar && closestDist < SAFE_FOLLOW_DIST) {
                        const intensity = clamp(1 - (closestDist / SAFE_FOLLOW_DIST), 0.2, 1);
                        const maxSpeed = closestCar.speed * (closestDist / SAFE_FOLLOW_DIST);
                        return { shouldBrake: true, maxSpeed: Math.max(0, maxSpeed), intensity };
                    }
                    if (closestCar && closestDist < DETECTION_RANGE * 0.6) {
                        const intensity = 0.3;
                        const maxSpeed = closestCar.speed * 0.8;
                        return { shouldBrake: true, maxSpeed, intensity };
                    }

                    return { shouldBrake: false, maxSpeed: MAX_SPEED, intensity: 0 };
                }

                getLateralDistance(other) {
                    // Perpendicular distance from other car's center to our direction line
                    const dx = other.x - this.x;
                    const dy = other.y - this.y;
                    // Project onto perpendicular direction
                    const perpDx = -this.direction.dy;
                    const perpDy = this.direction.dx;
                    return Math.abs(dx * perpDx + dy * perpDy);
                }

                checkIntersectionConflicts(allCars) {
                    const myDistToCenter = distance(this.x, this.y, CENTER_X, CENTER_Y);

                    for (const other of allCars) {
                        if (other === this || other.crashed) continue;
                        if (other._removeMe) continue;

                        const otherDistToCenter = distance(other.x, other.y, CENTER_X, CENTER_Y);

                        // Only consider cars near the intersection
                        if (otherDistToCenter > DETECTION_RANGE) continue;

                        const conflictType = this.getConflictType(other);

                        // Same direction: handled by checkAhead
                        if (conflictType === 'same-direction') continue;

                        // Opposite direction: potential conflict if one is turning left
                        if (conflictType === 'opposite') {
                            if (this.turnIntention === 'left' || other.turnIntention === 'left') {
                                // Both need to be cautious
                                if (myDistToCenter < INTERSECTION_HALF + 50 &&
                                    otherDistToCenter < INTERSECTION_HALF + 50) {
                                    if (this.turnIntention === 'left' && other.turnIntention === 'straight') {
                                        // We must yield to oncoming straight traffic
                                        return { shouldYield: true, maxSpeed: Math.min(1.0, other.speed * 0.5),
                                            intensity: 0.8 };
                                    }
                                    if (this.turnIntention === 'left' && other.turnIntention === 'left') {
                                        // Both turning left, proceed cautiously
                                        return { shouldYield: true, maxSpeed: 1.2, intensity: 0.5 };
                                    }
                                }
                            }
                            continue;
                        }

                        // Perpendicular conflict
                        if (conflictType === 'perpendicular') {
                            // Both approaching intersection
                            if (myDistToCenter < INTERSECTION_HALF + 70 &&
                                otherDistToCenter < INTERSECTION_HALF + 70) {

                                // If other car is already in intersection
                                if (other.inIntersection && !this.inIntersection) {
                                    return { shouldYield: true, maxSpeed: Math.min(0.6, other.speed * 0.3),
                                        intensity: 0.9 };
                                }

                                // If we're both approaching, use distance-based priority
                                // The car closer to the intersection goes first
                                if (otherDistToCenter < myDistToCenter - 15) {
                                    const speedRatio = otherDistToCenter / Math.max(1, myDistToCenter);
                                    return { shouldYield: true, maxSpeed: clamp(speedRatio * MAX_SPEED, 0.2, 1.5),
                                        intensity: 0.7 };
                                }

                                // If very close to each other, both slow down
                                if (myDistToCenter < INTERSECTION_HALF + 30 &&
                                    otherDistToCenter < INTERSECTION_HALF + 30) {
                                    return { shouldYield: true, maxSpeed: 1.0, intensity: 0.6 };
                                }
                            }

                            // If other car is very close to intersection and we're farther
                            if (otherDistToCenter < INTERSECTION_HALF + 20 &&
                                myDistToCenter < INTERSECTION_HALF + 80 &&
                                myDistToCenter > otherDistToCenter) {
                                return { shouldYield: true, maxSpeed: 1.3, intensity: 0.5 };
                            }
                        }
                    }

                    return { shouldYield: false, maxSpeed: MAX_SPEED, intensity: 0 };
                }

                executeTurn() {
                    this.hasTurned = true;
                    const oldDir = this.direction;

                    if (this.turnIntention === 'right') {
                        // Right turn: EAST->SOUTH, SOUTH->WEST, WEST->NORTH, NORTH->EAST
                        if (this.direction === EAST) this.direction = SOUTH;
                        else if (this.direction === SOUTH) this.direction = WEST;
                        else if (this.direction === WEST) this.direction = NORTH;
                        else if (this.direction === NORTH) this.direction = EAST;
                    } else if (this.turnIntention === 'left') {
                        // Left turn: EAST->NORTH, NORTH->WEST, WEST->SOUTH, SOUTH->EAST
                        if (this.direction === EAST) this.direction = NORTH;
                        else if (this.direction === NORTH) this.direction = WEST;
                        else if (this.direction === WEST) this.direction = SOUTH;
                        else if (this.direction === SOUTH) this.direction = EAST;
                    }

                    // Snap to appropriate lane on new road
                    this.snapToNewLane(oldDir);
                    this.speed = clamp(this.speed, 0.8, 1.6);
                    this.inIntersection = true;
                }

                snapToNewLane(oldDir) {
                    // Determine which lane the car should be on after turning
                    const wasOuter = this.laneIndex === 0;
                    const newLaneIdx = wasOuter ? 0 : 1;

                    if (this.direction === SOUTH) {
                        this.x = getLaneXForSouthbound(newLaneIdx);
                        this.y = CENTER_Y + 5;
                    } else if (this.direction === NORTH) {
                        this.x = getLaneXForNorthbound(newLaneIdx);
                        this.y = CENTER_Y - 5;
                    } else if (this.direction === EAST) {
                        this.y = getLaneYForEastbound(newLaneIdx);
                        this.x = CENTER_X + 5;
                    } else if (this.direction === WEST) {
                        this.y = getLaneYForWestbound(newLaneIdx);
                        this.x = CENTER_X - 5;
                    }
                    this.laneIndex = newLaneIdx;
                }

                draw(ctx) {
                    if (this._removeMe) return;
                    if (this.crashed && !this._removeMe) {
                        // Draw wrecked car (darker, slightly offset)
                        ctx.save();
                        ctx.globalAlpha = 0.5;
                        this.drawCarBody(ctx, '#444');
                        ctx.restore();
                        return;
                    }

                    // Draw headlight cones FIRST (on the road surface)
                    this.drawHeadlightCones(ctx);

                    // Draw car body
                    this.drawCarBody(ctx, this.color);

                    // Draw brake lights
                    if (this.braking && this.brakeIntensity > 0.15) {
                        this.drawBrakeLights(ctx);
                    }

                    // Draw headlight source points
                    this.drawHeadlightSources(ctx);

                    // Draw subtle tail lights (always dim)
                    this.drawTailLights(ctx, this.braking ? 0.9 : 0.2);
                }

                drawCarBody(ctx, color) {
                    ctx.save();
                    const halfL = CAR_LENGTH / 2;
                    const halfW = CAR_WIDTH / 2;

                    ctx.fillStyle = color;
                    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                    ctx.lineWidth = 1.2;
                    ctx.shadowColor = 'rgba(0,0,0,0.6)';
                    ctx.shadowBlur = 6;

                    ctx.beginPath();
                    if (this.direction.horizontal) {
                        // Rounded rectangle
                        const rx = this.x - halfL;
                        const ry = this.y - halfW;
                        const rw = CAR_LENGTH;
                        const rh = CAR_WIDTH;
                        const r = 4;
                        ctx.moveTo(rx + r, ry);
                        ctx.lineTo(rx + rw - r, ry);
                        ctx.arcTo(rx + rw, ry, rx + rw, ry + r, r);
                        ctx.lineTo(rx + rw, ry + rh - r);
                        ctx.arcTo(rx + rw, ry + rh, rx + rw - r, ry + rh, r);
                        ctx.lineTo(rx + r, ry + rh);
                        ctx.arcTo(rx, ry + rh, rx, ry + rh - r, r);
                        ctx.lineTo(rx, ry + r);
                        ctx.arcTo(rx, ry, rx + r, ry, r);
                        ctx.closePath();
                    } else {
                        const rx = this.x - halfW;
                        const ry = this.y - halfL;
                        const rw = CAR_WIDTH;
                        const rh = CAR_LENGTH;
                        const r = 4;
                        ctx.moveTo(rx + r, ry);
                        ctx.lineTo(rx + rw - r, ry);
                        ctx.arcTo(rx + rw, ry, rx + rw, ry + r, r);
                        ctx.lineTo(rx + rw, ry + rh - r);
                        ctx.arcTo(rx + rw, ry + rh, rx + rw - r, ry + rh, r);
                        ctx.lineTo(rx + r, ry + rh);
                        ctx.arcTo(rx, ry + rh, rx, ry + rh - r, r);
                        ctx.lineTo(rx, ry + r);
                        ctx.arcTo(rx, ry, rx + r, ry + r, r);
                        ctx.closePath();
                    }
                    ctx.fill();
                    ctx.stroke();

                    // Subtle windshield
                    ctx.fillStyle = 'rgba(180,210,240,0.35)';
                    const wb = this.getBounds();
                    const cx = wb.x + wb.w / 2;
                    const cy = wb.y + wb.h / 2;
                    if (this.direction.horizontal) {
                        ctx.fillRect(cx - 3, cy - CAR_WIDTH * 0.35, 7, CAR_WIDTH * 0.7);
                    } else {
                        ctx.fillRect(cx - CAR_WIDTH * 0.35, cy - 3, CAR_WIDTH * 0.7, 7);
                    }

                    ctx.restore();
                }

                drawHeadlightCones(ctx) {
                    const frontCorners = this.getFrontCorners();
                    const halfL = CAR_LENGTH / 2;
                    const range = HEADLIGHT_RANGE;

                    // Wide spill cone
                    ctx.save();
                    ctx.globalAlpha = 0.13;
                    const spillSpread = 32;
                    const sx1 = frontCorners[0].x;
                    const sy1 = frontCorners[0].y;
                    const sx2 = frontCorners[1].x;
                    const sy2 = frontCorners[1].y;
                    const ex1 = this.x + this.direction.dx * (halfL + range) - this.direction.dy * spillSpread;
                    const ey1 = this.y + this.direction.dy * (halfL + range) + this.direction.dx * spillSpread;
                    const ex2 = this.x + this.direction.dx * (halfL + range) + this.direction.dy * spillSpread;
                    const ey2 = this.y + this.direction.dy * (halfL + range) - this.direction.dx * spillSpread;

                    const grad = ctx.createLinearGradient(
                        this.x, this.y,
                        this.x + this.direction.dx * range,
                        this.y + this.direction.dy * range
                    );
                    grad.addColorStop(0, 'rgba(255,240,210,0.9)');
                    grad.addColorStop(0.3, 'rgba(255,220,170,0.5)');
                    grad.addColorStop(0.7, 'rgba(255,200,140,0.1)');
                    grad.addColorStop(1, 'rgba(255,180,100,0)');

                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.moveTo(sx1, sy1);
                    ctx.lineTo(sx2, sy2);
                    ctx.lineTo(ex2, ey2);
                    ctx.lineTo(ex1, ey1);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();

                    // Narrow bright cone
                    ctx.save();
                    ctx.globalAlpha = 0.18;
                    const narrowSpread = 14;
                    const nex1 = this.x + this.direction.dx * (halfL + range) - this.direction.dy * narrowSpread;
                    const ney1 = this.y + this.direction.dy * (halfL + range) + this.direction.dx * narrowSpread;
                    const nex2 = this.x + this.direction.dx * (halfL + range) + this.direction.dy * narrowSpread;
                    const ney2 = this.y + this.direction.dy * (halfL + range) - this.direction.dx * narrowSpread;

                    const grad2 = ctx.createLinearGradient(
                        this.x, this.y,
                        this.x + this.direction.dx * range,
                        this.y + this.direction.dy * range
                    );
                    grad2.addColorStop(0, 'rgba(255,250,235,1)');
                    grad2.addColorStop(0.15, 'rgba(255,240,210,0.7)');
                    grad2.addColorStop(0.5, 'rgba(255,210,160,0.2)');
                    grad2.addColorStop(1, 'rgba(255,180,100,0)');

                    ctx.fillStyle = grad2;
                    ctx.beginPath();
                    ctx.moveTo(sx1, sy1);
                    ctx.lineTo(sx2, sy2);
                    ctx.lineTo(nex2, ney2);
                    ctx.lineTo(nex1, ney1);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();

                    // Road illumination glow
                    ctx.save();
                    ctx.globalAlpha = 0.08;
                    const glowGrad = ctx.createRadialGradient(
                        this.x + this.direction.dx * (halfL + range * 0.5),
                        this.y + this.direction.dy * (halfL + range * 0.5),
                        5,
                        this.x + this.direction.dx * (halfL + range * 0.5),
                        this.y + this.direction.dy * (halfL + range * 0.5),
                        range * 0.8
                    );
                    glowGrad.addColorStop(0, 'rgba(255,240,200,0.7)');
                    glowGrad.addColorStop(1, 'rgba(255,200,140,0)');
                    ctx.fillStyle = glowGrad;
                    ctx.beginPath();
                    ctx.arc(
                        this.x + this.direction.dx * (halfL + range * 0.5),
                        this.y + this.direction.dy * (halfL + range * 0.5),
                        range * 0.8, 0, Math.PI * 2
                    );
                    ctx.fill();
                    ctx.restore();
                }

                drawHeadlightSources(ctx) {
                    const frontCorners = this.getFrontCorners();
                    ctx.save();
                    for (const fc of frontCorners) {
                        const glow = ctx.createRadialGradient(fc.x, fc.y, 1, fc.x, fc.y, 8);
                        glow.addColorStop(0, 'rgba(255,255,240,0.95)');
                        glow.addColorStop(0.3, 'rgba(255,250,220,0.6)');
                        glow.addColorStop(1, 'rgba(255,200,150,0)');
                        ctx.fillStyle = glow;
                        ctx.beginPath();
                        ctx.arc(fc.x, fc.y, 8, 0, Math.PI * 2);
                        ctx.fill();

                        // Bright center
                        ctx.fillStyle = '#fffef5';
                        ctx.shadowColor = '#ffeedd';
                        ctx.shadowBlur = 4;
                        ctx.beginPath();
                        ctx.arc(fc.x, fc.y, 2.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.restore();
                }

                drawBrakeLights(ctx) {
                    const rearCorners = this.getRearCorners();
                    ctx.save();
                    const intensity = this.brakeIntensity;

                    for (const rc of rearCorners) {
                        // Glow
                        const glow = ctx.createRadialGradient(rc.x, rc.y, 1, rc.x, rc.y, 10);
                        glow.addColorStop(0, `rgba(255,30,10,${0.95 * intensity})`);
                        glow.addColorStop(0.4, `rgba(255,20,5,${0.6 * intensity})`);
                        glow.addColorStop(1, 'rgba(255,0,0,0)');
                        ctx.fillStyle = glow;
                        ctx.shadowColor = '#ff0000';
                        ctx.shadowBlur = 12 * intensity;
                        ctx.beginPath();
                        ctx.arc(rc.x, rc.y, 10, 0, Math.PI * 2);
                        ctx.fill();

                        // Bright point
                        ctx.fillStyle = `rgba(255,40,20,${0.9 * intensity})`;
                        ctx.shadowBlur = 6 * intensity;
                        ctx.beginPath();
                        ctx.arc(rc.x, rc.y, 3.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.restore();
                }

                drawTailLights(ctx, alpha) {
                    const rearCorners = this.getRearCorners();
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    for (const rc of rearCorners) {
                        ctx.fillStyle = '#ff3020';
                        ctx.shadowColor = '#ff0000';
                        ctx.shadowBlur = 3;
                        ctx.beginPath();
                        ctx.arc(rc.x, rc.y, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.restore();
                }
            }

            // --- Spawn a new car ---
            function spawnCar() {
                if (cars.filter(c => !c._removeMe && !c.crashed).length >= MAX_ACTIVE_CARS) return;

                const side = randomInt(0, 3); // 0=left, 1=right, 2=top, 3=bottom
                const laneIdx = randomInt(0, 1); // 0=outer, 1=inner
                const turnIntention = randomChoice(['straight', 'straight', 'straight', 'right', 'right', 'left']);
                const color = randomChoice(CAR_COLORS);

                let x, y, direction;

                switch (side) {
                    case 0: // Left side, going EAST
                        x = -30;
                        y = getLaneYForEastbound(laneIdx);
                        direction = EAST;
                        break;
                    case 1: // Right side, going WEST
                        x = W + 30;
                        y = getLaneYForWestbound(laneIdx);
                        direction = WEST;
                        break;
                    case 2: // Top side, going SOUTH
                        y = -30;
                        x = getLaneXForSouthbound(laneIdx);
                        direction = SOUTH;
                        break;
                    case 3: // Bottom side, going NORTH
                        y = H + 30;
                        x = getLaneXForNorthbound(laneIdx);
                        direction = NORTH;
                        break;
                }

                // Check if spawn area is clear
                const spawnClear = cars.every(c => {
                    if (c._removeMe || c.crashed) return true;
                    return distance(c.x, c.y, x, y) > 70;
                });

                if (!spawnClear) return;

                const car = new Car(x, y, direction, laneIdx, turnIntention, color);
                cars.push(car);
            }

            // --- Check collisions ---
            function checkCollisions() {
                const activeCars = cars.filter(c => !c.crashed && !c._removeMe);

                for (let i = 0; i < activeCars.length; i++) {
                    for (let j = i + 1; j < activeCars.length; j++) {
                        const a = activeCars[i];
                        const b = activeCars[j];
                        const ba = a.getBounds();
                        const bb = b.getBounds();

                        // Slightly shrink bounds to avoid false collisions (minor overlaps)
                        const shrink = 2;
                        const overlap = rectsOverlap(
                            ba.x + shrink, ba.y + shrink, ba.w - shrink * 2, ba.h - shrink * 2,
                            bb.x + shrink, bb.y + shrink, bb.w - shrink * 2, bb.h - shrink * 2
                        );

                        if (overlap) {
                            // CRASH!
                            const crashX = (a.x + b.x) / 2;
                            const crashY = (a.y + b.y) / 2;
                            a.crashed = true;
                            b.crashed = true;
                            a.speed = 0;
                            b.speed = 0;
                            explosions.push(new Explosion(crashX, crashY));
                            totalCrashes++;
                            crashCounterEl.textContent = 'CRASHES: ' + totalCrashes;
                        }
                    }
                }
            }

            // --- Clean up ---
            function cleanupCars() {
                // Remove cars flagged for removal
                cars = cars.filter(c => !c._removeMe);

                // Remove crashed cars after their explosion has likely faded
                cars = cars.filter(c => {
                    if (c.crashed) {
                        // Keep crashed cars for a short time so they're visible
                        if (!c._crashTime) c._crashTime = performance.now() / 1000;
                        const elapsed = performance.now() / 1000 - c._crashTime;
                        return elapsed < 2.5;
                    }
                    return true;
                });

                // Clean old explosions
                explosions = explosions.filter(e => !e.isDead());
            }

            // --- Draw Scene ---
            function drawScene() {
                ctx.clearRect(0, 0, W, H);

                // Background (surrounding terrain - dark)
                const bgGrad = ctx.createRadialGradient(CENTER_X, CENTER_Y, 200, CENTER_X, CENTER_Y, W);
                bgGrad.addColorStop(0, '#1a1d1a');
                bgGrad.addColorStop(1, '#080a08');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, W, H);

                // Draw roads
                drawRoads();

                // Draw intersection markings
                drawIntersectionMarkings();

                // Draw subtle ambient light at intersection (like distant streetlights)
                drawAmbientLighting();

                // Sort cars by Y for slight depth ordering
                const sortedCars = [...cars].sort((a, b) => a.y - b.y);

                // Draw all cars
                for (const car of sortedCars) {
                    car.draw(ctx);
                }

                // Draw explosions on top
                for (const exp of explosions) {
                    exp.draw(ctx);
                }
            }

            function drawRoads() {
                // Horizontal road
                const hRoadY = CENTER_Y - ROAD_HALF;
                const hRoadH = ROAD_HALF * 2;

                // Road surface
                const roadGradH = ctx.createLinearGradient(0, hRoadY, 0, hRoadY + hRoadH);
                roadGradH.addColorStop(0, '#2a2d2a');
                roadGradH.addColorStop(0.3, '#353835');
                roadGradH.addColorStop(0.5, '#3a3d3a');
                roadGradH.addColorStop(0.7, '#353835');
                roadGradH.addColorStop(1, '#2a2d2a');
                ctx.fillStyle = roadGradH;
                ctx.fillRect(0, hRoadY, W, hRoadH);

                // Vertical road
                const vRoadX = CENTER_X - ROAD_HALF;
                const vRoadW = ROAD_HALF * 2;
                const roadGradV = ctx.createLinearGradient(vRoadX, 0, vRoadX + vRoadW, 0);
                roadGradV.addColorStop(0, '#2a2d2a');
                roadGradV.addColorStop(0.3, '#353835');
                roadGradV.addColorStop(0.5, '#3a3d3a');
                roadGradV.addColorStop(0.7, '#353835');
                roadGradV.addColorStop(1, '#2a2d2a');
                ctx.fillStyle = roadGradV;
                ctx.fillRect(vRoadX, 0, vRoadW, H);

                // Intersection area (blend both roads)
                ctx.fillStyle = '#383b38';
                ctx.fillRect(CENTER_X - ROAD_HALF, CENTER_Y - ROAD_HALF, ROAD_HALF * 2, ROAD_HALF * 2);

                // Road edge lines
                ctx.strokeStyle = 'rgba(200,200,200,0.3)';
                ctx.lineWidth = 2;
                // Horizontal road edges
                ctx.beginPath();
                ctx.moveTo(0, CENTER_Y - ROAD_HALF);
                ctx.lineTo(W, CENTER_Y - ROAD_HALF);
                ctx.moveTo(0, CENTER_Y + ROAD_HALF);
                ctx.lineTo(W, CENTER_Y + ROAD_HALF);
                ctx.stroke();

                // Vertical road edges
                ctx.beginPath();
                ctx.moveTo(CENTER_X - ROAD_HALF, 0);
                ctx.lineTo(CENTER_X - ROAD_HALF, H);
                ctx.moveTo(CENTER_X + ROAD_HALF, 0);
                ctx.lineTo(CENTER_X + ROAD_HALF, H);
                ctx.stroke();

                // Lane divider dashes - Horizontal road
                ctx.strokeStyle = 'rgba(220,220,220,0.35)';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([18, 14]);
                ctx.beginPath();
                ctx.moveTo(0, CENTER_Y);
                ctx.lineTo(CENTER_X - ROAD_HALF - 4, CENTER_Y);
                ctx.moveTo(CENTER_X + ROAD_HALF + 4, CENTER_Y);
                ctx.lineTo(W, CENTER_Y);
                ctx.stroke();
                ctx.setLineDash([]);

                // Lane divider dashes - Vertical road
                ctx.setLineDash([18, 14]);
                ctx.beginPath();
                ctx.moveTo(CENTER_X, 0);
                ctx.lineTo(CENTER_X, CENTER_Y - ROAD_HALF - 4);
                ctx.moveTo(CENTER_X, CENTER_Y + ROAD_HALF + 4);
                ctx.lineTo(CENTER_X, H);
                ctx.stroke();
                ctx.setLineDash([]);

                // Inner lane markers (dashed, subtler)
                ctx.strokeStyle = 'rgba(200,200,200,0.2)';
                ctx.lineWidth = 1;
                ctx.setLineDash([8, 20]);
                // Horizontal inner lanes
                const innerOffsetsH = [LANE_INNER, -LANE_INNER];
                for (const off of innerOffsetsH) {
                    const ly = CENTER_Y + off;
                    if (Math.abs(off) > 2) {
                        ctx.beginPath();
                        ctx.moveTo(0, ly);
                        ctx.lineTo(CENTER_X - ROAD_HALF - 2, ly);
                        ctx.moveTo(CENTER_X + ROAD_HALF + 2, ly);
                        ctx.lineTo(W, ly);
                        ctx.stroke();
                    }
                }
                // Vertical inner lanes
                const innerOffsetsV = [LANE_INNER, -LANE_INNER];
                for (const off of innerOffsetsV) {
                    const lx = CENTER_X + off;
                    if (Math.abs(off) > 2) {
                        ctx.beginPath();
                        ctx.moveTo(lx, 0);
                        ctx.lineTo(lx, CENTER_Y - ROAD_HALF - 2);
                        ctx.moveTo(lx, CENTER_Y + ROAD_HALF + 2);
                        ctx.lineTo(lx, H);
                        ctx.stroke();
                    }
                }
                ctx.setLineDash([]);
            }

            function drawIntersectionMarkings() {
                // Stop lines (thick white lines before intersection)
                const stopOffset = ROAD_HALF + 8;
                ctx.strokeStyle = 'rgba(240,240,240,0.5)';
                ctx.lineWidth = 4;

                // Horizontal road stop lines
                const hStopX1 = CENTER_X - ROAD_HALF - 8;
                const hStopX2 = CENTER_X + ROAD_HALF + 8;
                // Eastbound stop line (before intersection, left side)
                ctx.beginPath();
                ctx.moveTo(hStopX1, CENTER_Y - ROAD_HALF);
                ctx.lineTo(hStopX1, CENTER_Y);
                ctx.stroke();
                // Westbound stop line (before intersection, right side)
                ctx.beginPath();
                ctx.moveTo(hStopX2, CENTER_Y);
                ctx.lineTo(hStopX2, CENTER_Y + ROAD_HALF);
                ctx.stroke();

                // Vertical road stop lines
                const vStopY1 = CENTER_Y - ROAD_HALF - 8;
                const vStopY2 = CENTER_Y + ROAD_HALF + 8;
                // Southbound stop line
                ctx.beginPath();
                ctx.moveTo(CENTER_X - ROAD_HALF, vStopY1);
                ctx.lineTo(CENTER_X, vStopY1);
                ctx.stroke();
                // Northbound stop line
                ctx.beginPath();
                ctx.moveTo(CENTER_X, vStopY2);
                ctx.lineTo(CENTER_X + ROAD_HALF, vStopY2);
                ctx.stroke();
            }

            function drawAmbientLighting() {
                // Subtle light pools at the intersection (like overhead streetlights)
                const lightGrad = ctx.createRadialGradient(CENTER_X, CENTER_Y, 30, CENTER_X, CENTER_Y, 180);
                lightGrad.addColorStop(0, 'rgba(255,240,210,0.04)');
                lightGrad.addColorStop(0.4, 'rgba(255,220,180,0.02)');
                lightGrad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = lightGrad;
                ctx.fillRect(CENTER_X - 200, CENTER_Y - 200, 400, 400);

                // Additional dim light at road edges near intersection
                const lightGrad2 = ctx.createRadialGradient(CENTER_X, CENTER_Y, 60, CENTER_X, CENTER_Y, 250);
                lightGrad2.addColorStop(0, 'rgba(255,245,220,0.025)');
                lightGrad2.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = lightGrad2;
                ctx.fillRect(CENTER_X - 280, CENTER_Y - 280, 560, 560);
            }

            // --- Main Game Loop ---
            let lastTime = performance.now();

            function gameLoop(timestamp) {
                let dt = (timestamp - lastTime) / 1000;
                lastTime = timestamp;

                // Clamp dt to prevent large jumps
                if (dt > 0.15) dt = 0.15;
                if (dt <= 0) dt = 0.016;

                // Spawn cars
                spawnTimer += dt * 1000;
                if (spawnTimer >= nextSpawnTime) {
                    spawnTimer = 0;
                    nextSpawnTime = randomRange(SPAWN_INTERVAL_MIN, SPAWN_INTERVAL_MAX);
                    spawnCar();
                    // Occasionally spawn a second car from another side
                    if (Math.random() < 0.35) {
                        setTimeout(() => {
                            if (cars.filter(c => !c._removeMe && !c.crashed).length < MAX_ACTIVE_CARS) {
                                spawnCar();
                            }
                        }, randomRange(80, 300));
                    }
                }

                // Update cars
                const allCarsSnapshot = [...cars];
                for (const car of cars) {
                    if (!car.crashed && !car._removeMe) {
                        car.update(dt, allCarsSnapshot);
                    }
                }

                // Update explosions
                for (const exp of explosions) {
                    exp.update(dt);
                }

                // Check collisions
                checkCollisions();

                // Cleanup
                cleanupCars();

                // Draw
                drawScene();

                // Ensure minimum car count
                const activeCount = cars.filter(c => !c._removeMe && !c.crashed).length;
                if (activeCount < 6 && spawnTimer > 200) {
                    spawnTimer = nextSpawnTime - 50;
                }

                frameCount++;
                requestAnimationFrame(gameLoop);
            }

            // --- Initialize ---
            function init() {
                // Spawn initial cars
                for (let i = 0; i < 10; i++) {
                    spawnCar();
                    // Stagger initial spawns slightly
                }
                // Spawn a few more after a short delay
                setTimeout(() => {
                    for (let i = 0; i < 5; i++) {
                        if (cars.filter(c => !c._removeMe && !c.crashed).length < MAX_ACTIVE_CARS) {
                            spawnCar();
                        }
                    }
                }, 400);

                requestAnimationFrame(gameLoop);
            }

            init();

            console.log('🚗 4-Way Intersection Simulation Ready');
            console.log('   - No traffic lights');
            console.log('   - AI collision avoidance active');
            console.log('   - Night mode with headlights & brake lights');
            console.log('   - Crash explosions on failure');
            console.log('   - Cars: ' + CAR_COLORS.length + ' colors available');
        })();
    </script>
